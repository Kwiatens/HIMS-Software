<!-- HIMS - Hardware Inventory Management System | Local mobile scanner page -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HIMS Scanner</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #050607;
      --flash: rgba(64, 255, 128, 0.34);
    }
    * { box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
    }
    body {
      margin: 0;
      overflow: hidden;
      background: radial-gradient(circle at center, #0b0f10 0%, var(--bg) 100%);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: var(--flash);
      opacity: 0;
      pointer-events: none;
    }
    body.flash::before {
      animation: flashGreen 320ms ease-out;
    }
    @keyframes flashGreen {
      0% { opacity: 0.85; }
      100% { opacity: 0; }
    }
    .frame {
      position: fixed;
      inset: 0;
      overflow: hidden;
      background: #000;
    }
    video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000;
    }
    .status {
      position: absolute;
      left: 16px;
      bottom: 16px;
      padding: 8px 10px;
      border-radius: 999px;
      background: rgba(0,0,0,0.45);
      color: rgba(255,255,255,0.72);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      backdrop-filter: blur(8px);
      opacity: 0;
      transition: opacity 160ms ease;
    }
    .status.show {
      opacity: 1;
    }
    .status.ok {
      background: rgba(64, 255, 128, 0.16);
      color: #b9ffd0;
    }
    .status.err {
      background: rgba(255, 90, 90, 0.16);
      color: #ffd0d0;
    }
    .hidden {
      display: flex;
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
      left: -9999px;
    }
  </style>
</head>
<body>
  <div class="frame">
    <video id="video" playsinline muted></video>
    <div class="status" id="status"></div>
    <input id="scanText" class="hidden" autocomplete="off" inputmode="none" aria-hidden="true">
  </div>

  <script>
    let detector = null;
    let stream = null;
    let scanBusy = false;
    let lastScanValue = '';
    let lastScanAt = 0;
    let scanning = false;
    const statusEl = document.getElementById('status');
    const videoEl = document.getElementById('video');
    const bodyEl = document.body;

    function showStatus(message, kind) {
      if (!message) {
        statusEl.className = 'status';
        statusEl.textContent = '';
        return;
      }
      statusEl.textContent = message;
      statusEl.className = 'status show' + (kind ? ` ${kind}` : '');
    }

    async function submitScan(code) {
      const clean = (code || '').trim();
      if (!clean || scanBusy) return;
      scanBusy = true;
      try {
        const response = await fetch('/api/scan', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code: clean })
        });
        const payload = await response.json();
        if (response.ok) {
          bodyEl.classList.remove('flash');
          void bodyEl.offsetWidth;
          bodyEl.classList.add('flash');
        } else {
          showStatus(payload.message || 'Scan rejected', 'err');
        }
        document.getElementById('scanText').value = '';
      } catch (error) {
        showStatus('Offline', 'err');
      } finally {
        scanBusy = false;
      }
    }

    async function startCamera() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        videoEl.srcObject = stream;
        await videoEl.play();
        if ('BarcodeDetector' in window) {
          detector = new BarcodeDetector({ formats: ['qr_code', 'data_matrix', 'code_128', 'ean_13'] });
          if (!scanning) {
            scanning = true;
            scanLoop();
          }
        } else if (!detector) {
          showStatus('Barcode detector unavailable', 'err');
        }
      } catch (error) {
        showStatus('Camera denied', 'err');
      }
    }

    async function scanLoop() {
      if (!detector || !stream) {
        scanning = false;
        return;
      }
      try {
        const results = await detector.detect(videoEl);
        if (results.length > 0) {
          const value = results[0].rawValue || '';
          const now = Date.now();
          if (value && (value !== lastScanValue || now - lastScanAt > 1500)) {
            lastScanValue = value;
            lastScanAt = now;
            await submitScan(value);
          }
        }
      } catch (error) {
        // Keep retrying; camera feeds often hiccup while focusing.
      }
      requestAnimationFrame(scanLoop);
    }

    startCamera();
  </script>
</body>
</html>
